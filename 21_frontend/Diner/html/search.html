<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineTime - Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/search.css">

    <script src="../../js/data.js"></script>
</head>
<body>
    <header class="search-header">
        <div class="header-container">
            <div class="logo-group" onclick="window.location.href='browse.html'" style="cursor: pointer;">
                <img src="../images/logo.png" alt="DineTime Logo" height="28" />
                <span class="logo-text">DineTime</span>
            </div>
            
            <button class="back-btn" id="backBtn" title="Go Back">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <div class="search-bar-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon" style="margin-right: 8px;"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search for restaurants, cuisines..." autofocus>
            </div>
        </div>
    </header>

    <main class="page-container">
        <div id="resultsInfo" class="results-info"></div>
        
        <div id="restaurant-list" class="restaurant-list">
            
        </div>

        <div id="no-results" class="no-results hidden">
            <h2>No results matching</h2>
            <p>Try searching for a different name or cuisine.</p>
        </div>
    </main>

    <script src="../js/store.js"></script>
    <script src="../js/search.js"></script>
</body>
</html>
