<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineTime - Reservation Confirmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/confirmation.css">

    <script src="../../js/data.js"></script>
</head>
<body class="layout-stacked">
    <header style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm);">
        <div style="display: flex; align-items: center; gap: 8px; cursor: pointer;" onclick="window.location.href='browse.html'">
            <img src="../images/logo.png" alt="DineTime Logo" height="28">
            <span style="font-size: 1.1rem; font-weight: 700; color: var(--text-main);">DineTime</span>
        </div>
        <div>
            <i class="fa-regular fa-user" style="font-size: 1.3rem; color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 50%;" onclick="window.location.href='profile.html'"></i>
        </div>
    </header>

    <main class="page-main">
        <div class="success-hero">
            <div class="check-circle">
                <i class="fa-solid fa-check check-icon"></i>
            </div>
            <h1 class="confirmed-title">Reservation Confirmed!</h1>
            <p class="confirmed-sub">Your table has been successfully reserved. We look forward to serving you.</p>
        </div>

        <div class="details-card">
            <h2 class="card-section-title">Reservation Details</h2>
            <div class="card-divider"></div>

            <div class="restaurant-row" id="restaurantRow"></div>

            <div class="card-divider"></div>

            <h3 class="booking-section-title">Booking Information</h3>
            <div class="booking-grid" id="bookingGrid"></div>

            <div class="card-divider"></div>

            <h3 class="booking-section-title">Payment Confirmation</h3>
            <div class="payment-confirm-box" id="paymentConfirmBox"></div>

            <div class="arrive-notice">
                <i class="fa-solid fa-circle-info arrive-icon"></i>
                <span>Please arrive 10 minutes before your reservation time.</span>
            </div>
        </div>

        <div class="action-row">
            <button class="btn-reservations" id="btnReservations">View My Reservations</button>
            <button class="btn-explore" id="btnExplore">Explore More Restaurants</button>
        </div>
    </main>

    <script src="../js/store.js"></script>
    <script src="../js/confirmation.js"></script>
</body>
</html>
